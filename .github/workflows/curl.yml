name: curl Test

# START OF COMMON SECTION
on:
  push:
    branches: [ 'release/**' ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
# END OF COMMON SECTION

jobs:
  build_wolfssl:
    name: Build wolfSSL
    if: ${{ (github.repository_owner == 'wolfssl') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    # This should be a safe limit for the tests to run.
    timeout-minutes: 4
    steps:
      - name: Build wolfSSL
        uses: wolfSSL/actions-build-autotools-project@v1
        with:
          path: wolfssl
          configure: --enable-curl
          install: true

      - name: tar build-dir
        run: tar -zcf build-dir.tgz build-dir

      - name: Upload built lib
        uses: actions/upload-artifact@v6
        with:
          name: wolf-install-curl
          path: build-dir.tgz
          retention-days: 5

  test_curl:
    name: ${{ matrix.curl_ref }}
    if: ${{ (github.repository_owner == 'wolfssl') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    # This should be a safe limit for the tests to run.
    timeout-minutes: 15
    needs: build_wolfssl
    strategy:
      fail-fast: false
      matrix:
        curl_ref: [ 'master', 'curl-8_4_0' ]
    steps:
    - name: Checkout wolfSSL CI actions
      uses: actions/checkout@v5
      with:
        sparse-checkout: .github/actions
        fetch-depth: 1

    - name: Install test dependencies
      uses: ./.github/actions/install-apt-deps
      with:
        packages: nghttp2 libpsl5 libpsl-dev python3-impacket apache2 apache2-dev
        ghcr-debs-tag: ubuntu-24.04-full

    - name: Download lib
      uses: actions/download-artifact@v7
      with:
        name: wolf-install-curl

    - name: untar build-dir
      run: tar -xf build-dir.tgz

    - name: Build curl
      uses: wolfSSL/actions-build-autotools-project@v1
      with:
        repository: curl/curl
        path: curl
        ref: ${{ matrix.curl_ref }}
        configure: --with-wolfssl=$GITHUB_WORKSPACE/build-dir --with-test-httpd=yes
        check: false

    - name: Test curl
      working-directory: curl
      run: make -j $(nproc) test-nonflaky
